name: Deploy Astro to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: cautioneo-gli.com

      - name: Ping IndexNow
        run: |
          curl -s -o /dev/null -w "%{http_code}" -X POST "https://api.indexnow.org/IndexNow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d '{
              "host": "cautioneo-gli.com",
              "key": "0a9cc6ed73475430ea32c09c7171765f",
              "keyLocation": "https://cautioneo-gli.com/0a9cc6ed73475430ea32c09c7171765f.txt",
              "urlList": [
                "https://cautioneo-gli.com/",
                "https://cautioneo-gli.com/blog",
                "https://cautioneo-gli.com/comparatif-gli"
              ]
            }'
          echo " - IndexNow pinged"
